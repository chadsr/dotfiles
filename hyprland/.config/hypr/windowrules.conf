
# ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ÄÉ ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ‚ÄÉ ‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚ĖĄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Window-Rules/

windowrule {
  name = idleinhibit-fullscreen-focus
  match:fullscreen = .*
  idle_inhibit = focus
}

windowrule {
  name = single-window
  border_size = 0
  match:workspace = w[t1]
}

windowrule {
  name = pavucontrol
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = bluetuith
  float = on
  match:class = ^(ghostty)$
  match:title = ^(bluetuith)$
}
windowrule {
  name = blueman-manager
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = nm-applet
  float = on
  match:class = ^(nm-applet)$
}

windowrule {
  name = nm-connection-editor
  float = on
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = kde-authentication-agent
  float = on
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
}

windowrule {
  name = gnome-authentication-agent
  float = on
  match:class = ^(polkit-gnome-authentication-agent-1)$
}

windowrule {
  name = dolphin-progress
  float = on
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Progress Dialog ‚ÄĒ Dolphin)$
}

windowrule {
  name = dolphin-copying
  float = on
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Copying ‚ÄĒ Dolphin)$q
}

windowrule {
  name = clipse
  float = on
  size = 660 660
  match:class = ^(com.example.clipse)$
}

windowrule {
  name = nextcloud
  float = on
  size = 600 800
  move = 0 24
  border_size = 0
  no_anim = on
  match:class = ^(com.nextcloud.desktopclient.nextcloud)$
  match:title = ^(Nextcloud)$
}


# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ ‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚ĖĄ‚Ėą

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = rofi
}

layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = notifications
}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-notification-window
}

layerrule {
  name = layerrule-4
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-5
  blur = on
  match:namespace = logout_dialog
}

layerrule {
  name = layerrule-6
  blur = on
  match:namespace = waybar
}
