$scrPath = $HOME/.local/share/bin # set scripts path

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor = ,preferred,auto,auto

# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Keywords/

exec-once = [[ -f "~/.config/hypr/profiles/$(hostname).conf" ]] && ln -s ~/.config/hypr/profiles/$(hostname).conf  ~/.config/hypr/hostname.conf     # load hostname-specific config
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP                                                        # for XDPH
exec-once = dbus-update-activation-environment --systemd --all                                                                                      # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP                                                                 # for XDPH
exec-once = systemctl --user start hypr-session.target
exec-once = hyprpm reload
exec-once = ~/.local/bin/gsettings-gtk
exec-once = sunsetr preset default

# ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# env = PATH,$PATH:$scrPath
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GRIMBLAST_EDITOR,"swappy -f"

ecosystem {
    enforce_permissions = true
    no_update_news = true
    no_donation_nag	= true
}

# ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ

# See https://wiki.hyprland.org/Configuring/Variables/

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
    numlock_by_default = true
}

cursor {
    no_hardware_cursors = 2
	no_warps = false
    persistent_warps = true
	hotspot_padding = 0
}

# See https://wiki.hyprland.org/Configuring/Variables/

gesture = 3, right, workspace, +1
gesture = 3, left, workspace, -1


# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚ĖĄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/

master {
    new_status = master
}

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ

# See https://wiki.hyprland.org/Configuring/Variables/

misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
        gesture_distance = 300 # how far is the "max" for the gesture
        hyprexpo-gesture = 3, vertical , expo
    }
}

# ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ

source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/themes/common.conf        # shared theme settings
source = ~/.config/hypr/themes/theme.conf         # theme specific settings
source = ~/.config/hypr/themes/colors.conf        # wallbash color override
source = ~/.config/hypr/userprefs.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/permissions.conf
source = ~/.config/hypr/hostname.conf
