on:
    push:
        branches:
            - main
    pull_request:

name: CI
permissions:
    contents: read

jobs:
    lint:
        name: Lint (pre-commit)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lua5.4 luarocks
            - uses: j178/prek-action@v2
              with:
                  extra-args: "--all-files"
