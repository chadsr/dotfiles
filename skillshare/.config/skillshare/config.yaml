# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
sources:
  skills: ~/.config/skillshare/skills
  agents: ~/.config/skillshare/agents
mode: merge
targets:
  cline:
    skills:
      path: ~/.cline/skills
  crush:
    skills:
      path: ~/.config/crush/skills
  forgecode:
    skills:
      path: ~/.config/forge/skills
  goose:
    skills:
      path: ~/.config/goose/skills
  opencode:
    skills:
      path: ~/.config/opencode/skills
  universal:
    skills:
      path: ~/.agents/skills
# Extras use merge (not symlink) so they can coexist with main targets in the same dirs.
# OpenSpec extras deploy directly to agent targets because skillshare blocks merge/symlink on its own source dirs.
# npx @fission-ai/openspec@latest workspace update --workspace shared
# cd ~/.local/share/openspec/workspaces/shared && npx @fission-ai/openspec@latest init --tools opencode
# skillshare sync --all
extras:
  - name: commands
    targets:
      - path: ~/.config/opencode/commands
      - path: ~/Documents/Cline/Workflows
  - name: openspec-skills
    source: ~/.local/share/openspec/workspaces/shared/.opencode/skills
    targets:
      - path: ~/.config/opencode/skills
  - name: openspec-commands
    source: ~/.local/share/openspec/workspaces/shared/.opencode/commands
    targets:
      - path: ~/.config/opencode/commands
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
