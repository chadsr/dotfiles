ANTHROPIC_HOST: https://api.anthropic.com
GOOSE_DISABLE_KEYRING: ''
GOOSE_MODE: smart_approve
GOOSE_TELEMETRY_ENABLED: false
OLLAMA_HOST: localhost
OPENAI_BASE_PATH: v1/chat/completions
OPENAI_HOST: https://api.openai.com
SECURITY_PROMPT_ENABLED: true
SECURITY_COMMAND_CLASSIFIER_ENABLED: false
extensions:
  memory:
    enabled: true
    type: builtin
    name: memory
    description: Tools to save and retrieve durable memories
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  developer:
    enabled: true
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  chrome-devtools-mcp:
    enabled: false
    type: stdio
    name: chrome-devtools-mcp
    description: Control and inspect a live Chrome browser
    cmd: npx
    args:
      - -y
      - chrome-devtools-mcp@latest
      - --executablePath=/usr/bin/chromium
      - --isolated=true
      - --no-usage-statistics
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: ''
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualisation and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  code_execution:
    enabled: true
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  tom:
    enabled: false
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  tutorial:
    enabled: false
    type: builtin
    name: tutorial
    description: Access interactive tutorials and guides
    display_name: Tutorial
    timeout: 300
    bundled: true
    available_tools: []
  gitmcp:
    enabled: false
    type: stdio
    name: Git MCP
    description: Git MCP server for up-to-date docs and project insights
    cmd: npx
    args:
      - -y
      - mcp-remote
      - https://gitmcp.io/docs
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  analyze:
    enabled: true
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  summarize:
    enabled: true
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
  orchestrator:
    enabled: true
    type: platform
    name: orchestrator
    description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
    display_name: Orchestrator
    bundled: true
    available_tools: []
  skills:
    enabled: true
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true
    available_tools: []
  mcpdocker:
    args:
      - mcp
      - gateway
      - run
      - --profile
      - dev-tools
    bundled: null
    cmd: docker
    description: The Docker MCP Toolkit allows for easy configuration and consumption of MCP servers from the Docker MCP Catalog
    enabled: true
    env_keys: []
    envs: {}
    name: mcpdocker
    timeout: 300
    type: stdio
providers:
  zai:
    enabled: true
    model: glm-5.2
    configured: true
active_provider: zai
ZAI_BASE_URL: https://api.z.ai/api/anthropic
GOOSE_THINKING_EFFORT: max
